services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  user-service:
    build: ./services/user-service
    image: user-service:local
    container_name: user-service
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin
      DB_NAME: userdb_local
      JWT_SECRET: my_super_secret_key
    depends_on:
      - postgres

  order-service:
    build: ./services/order-service
    image: order-service:local
    container_name: order-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin
      DB_NAME: orderdb_local
      JWT_SECRET: my_super_secret_key
      KAFKA_BROKER: kafka:9092
      PRODUCT_SERVICE_URL: http://product-service:3005
      ORDER_CREATED_TOPIC: order_created_local
    depends_on:
      - postgres
      - kafka
      - product-service

  payment-service:
    build: ./services/payment-service
    image: payment-service:local
    container_name: payment-service
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin
      DB_NAME: paymentdb_local
      JWT_SECRET: my_super_secret_key
      KAFKA_BROKER: kafka:9092
      ORDER_SERVICE_URL: http://order-service:3003
      ORDER_CREATED_TOPIC: order_created_local
      ORDER_CREATED_DLQ_TOPIC: order_created_dlq_local
      KAFKA_CONSUMER_GROUP: payment-group-local
    depends_on:
      - postgres
      - kafka
      - order-service

  search-service:
    build: ./services/search-service
    image: search-service:local
    container_name: search-service
    ports:
      - "5003:5003"
    environment:
      PORT: 5003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin
      DB_NAME: searchdb_local
      KAFKA_BROKER: kafka:9092
      ORDER_CREATED_TOPIC: order_created_local
      ORDER_CREATED_DLQ_TOPIC: order_created_dlq_local
      KAFKA_CONSUMER_GROUP: search-group-local
    depends_on:
      - postgres
      - kafka

  product-service:
    build: ./services/product-service
    image: product-service:local
    container_name: product-service
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin
      DB_NAME: productdb_local
      JWT_SECRET: my_super_secret_key
      KAFKA_BROKER: kafka:9092
      ORDER_CREATED_TOPIC: order_created_local
      ORDER_CREATED_DLQ_TOPIC: order_created_dlq_local
    depends_on:
      - postgres
      - kafka

  control-plane-service:
    build: ./services/control-plane-service
    image: control-plane-service:local
    container_name: control-plane-service
    ports:
      - "7100:7100"
    environment:
      PORT: 7100
      JWT_SECRET: my_super_secret_key
      CORS_ORIGIN: http://localhost:3001
    depends_on:
      - user-service

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    depends_on:
      - user-service
      - order-service
      - payment-service
      - search-service
      - product-service

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3007:3000"
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./docker/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

volumes:
  postgres_data:
