global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "search-service"
    static_configs:
      - targets: ["search-service:5003"]

  - job_name: "order-service"
    static_configs:
      - targets: ["order-service:3003"]

  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:3000"]

  - job_name: "payment-service"
    static_configs:
      - targets: ["payment-service:4000"]
