version: 0.2

env:
  variables:
    REGION: ap-south-1
    REPO_NAME: order-service

phases:
  pre_build:
    commands:
      - echo "Starting PRE_BUILD..."

      # Get AWS account ID
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

      # Validate AWS identity
      - echo "ACCOUNT_ID=$ACCOUNT_ID"
      - echo "REGION=$REGION"

      # Build full registry URL
      - REGISTRY="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"
      - echo "REGISTRY=$REGISTRY"

      # Login to ECR (must be done before docker build cache issues)
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $REGISTRY

      - echo "ECR login completed"

  build:
    commands:
      - echo "Build phase started..."

      # IMPORTANT: always build from service root context
      - cd services/order-service

      # Build image
      - docker build -t $REPO_NAME:latest .

      # Tag image for ECR
      - docker tag $REPO_NAME:latest $REGISTRY/$REPO_NAME:latest

  post_build:
    commands:
      - echo "Pushing image to ECR..."

      # Push image
      - docker push $REGISTRY/$REPO_NAME:latest

      # Kubernetes deployment trigger artifact (IMPORTANT for EKS automation)
      - printf '[{"name":"order-service","imageUri":"%s"}]' $REGISTRY/$REPO_NAME:latest > imagedefinitions.json

      - echo "Build completed successfully!"

artifacts:
  files:
    - imagedefinitions.json