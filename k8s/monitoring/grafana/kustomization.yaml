apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: dashboard
    grafana_dashboard: "1"

configMapGenerator:
  - name: grafana-dashboard-self-healing-platform
    files:
      - self-healing-platform.json=dashboards/self-healing-platform.json
