apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-bootstrap
  namespace: default
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: postgres-bootstrap
          image: postgres:15
          env:
            - name: PGPASSWORD
              value: admin
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "Waiting for Postgres..."
              until pg_isready -h postgres -p 5432 -U admin; do
                sleep 2
              done

              echo "Checking and creating databases..."

              for DB in userdb orderdb paymentdb productdb searchdb controlplanedb; do
                EXISTS=$(psql -h postgres -U admin -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='${DB}'")
                if [ "$EXISTS" != "1" ]; then
                  echo "Creating database: $DB"
                  psql -h postgres -U admin -d postgres -c "CREATE DATABASE ${DB};"
                else
                  echo "Database already exists: $DB"
                fi
              done

              echo "Postgres bootstrap complete."
