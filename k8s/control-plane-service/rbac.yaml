apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: control-plane-service-role
  namespace: prod
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch"]
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: control-plane-service-binding
  namespace: prod
subjects:
  - kind: ServiceAccount
    name: control-plane-service
    namespace: monitoring
roleRef:
  kind: Role
  name: control-plane-service-role
  apiGroup: rbac.authorization.k8s.io
