apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane-service
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: control-plane-service
  template:
    metadata:
      labels:
        app: control-plane-service
    spec:
      serviceAccountName: control-plane-service
      containers:
        - name: control-plane-service
          image: 348071628290.dkr.ecr.ap-south-1.amazonaws.com/control-plane-service:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 7100
          env:
            - name: PORT
              value: "7100"
            - name: DB_HOST
              value: "postgres.default.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "admin"
            - name: DB_PASSWORD
              value: "admin"
            - name: DB_NAME
              value: "controlplanedb"
            - name: JWT_SECRET
              value: "my_super_secret_key"
            - name: PROMETHEUS_BASE_URL
              value: "http://prometheus-server.default.svc.cluster.local"
            - name: HEALER_BASE_URL
              value: "http://healer-service.default.svc.cluster.local:7000"
            - name: CORS_ORIGIN
              value: "http://localhost:3001"
            - name: AI_CHAT_PROVIDER_ORDER
              value: "openrouter"
            - name: AI_CHAT_MAX_RETRIES
              value: "2"
            - name: AI_CHAT_RETRY_BACKOFF_MS
              value: "500"
            - name: OPENROUTER_CHAT_BASE_URL
              value: "https://openrouter.ai/api/v1"
            - name: OPENROUTER_CHAT_MODEL
              value: "openrouter/auto"
            - name: OPENROUTER_CHAT_TIMEOUT_MS
              value: "30000"
            - name: VECTOR_RETRIEVAL_ENABLED
              value: "true"
            - name: QDRANT_URL
              value: "http://192.168.29.86:6333"
            - name: QDRANT_COLLECTION
              value: "incident_summaries_prod"
            - name: QDRANT_DISTANCE
              value: "Cosine"
            - name: EMBEDDING_DIMENSION
              value: "2560"
            - name: EMBEDDING_PROVIDER_ORDER
              value: "openrouter"
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: control-plane-secrets
                  key: OPENROUTER_API_KEY
                  optional: true
            - name: OPENROUTER_EMBEDDING_BASE_URL
              value: "https://openrouter.ai/api/v1"
            - name: OPENROUTER_EMBEDDING_MODEL
              value: "qwen/qwen3-embedding-4b"
          readinessProbe:
            httpGet:
              path: /health
              port: 7100
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 7100
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 7100
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 24
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
