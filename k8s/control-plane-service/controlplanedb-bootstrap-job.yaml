apiVersion: batch/v1
kind: Job
metadata:
  name: controlplanedb-bootstrap
  namespace: monitoring
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: controlplanedb-bootstrap
          image: postgres:15
          env:
            - name: PGPASSWORD
              value: admin
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "Waiting for Postgres..."
              until pg_isready -h postgres.default.svc.cluster.local -p 5432 -U admin; do
                sleep 2
              done

              EXISTS=$(psql -h postgres.default.svc.cluster.local -U admin -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='controlplanedb'")

              if [ "$EXISTS" = "1" ]; then
                echo "Database controlplanedb already exists."
              else
                echo "Creating database controlplanedb..."
                psql -h postgres.default.svc.cluster.local -U admin -d postgres -c "CREATE DATABASE controlplanedb;"
                echo "Database controlplanedb created."
              fi
