apiVersion: apps/v1
kind: Deployment
metadata:
  name: healer-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healer-service
  template:
    metadata:
      labels:
        app: healer-service
    spec:
      serviceAccountName: healer-service
      containers:
        - name: healer-service
          image: 348071628290.dkr.ecr.ap-south-1.amazonaws.com/healer-service:manual-18
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          env:
            - name: DB_HOST
              value: "postgres.default.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "admin"
            - name: DB_PASSWORD
              value: "admin"
            - name: DB_NAME
              value: "healerdb"
            