apiVersion: v1
kind: ServiceAccount
metadata:
  name: healer-service
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: healer-service-role
  namespace: dev
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: healer-service-binding
  namespace: dev
subjects:
  - kind: ServiceAccount
    name: healer-service
    namespace: default
roleRef:
  kind: Role
  name: healer-service-role
  apiGroup: rbac.authorization.k8s.io