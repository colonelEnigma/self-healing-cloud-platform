apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: 348071628290.dkr.ecr.ap-south-1.amazonaws.com/product-service:${IMAGE_TAG}
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          ports:
            - containerPort: 3005

          env:
            - name: PORT
              value: "3005"

            - name: DB_HOST
              value: "postgres.default.svc.cluster.local"

            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: admin
            - name: DB_PASSWORD
              value: admin

            - name: DB_NAME
              value: productdb

            - name: KAFKA_BROKER
              value: kafka.default.svc.cluster.local:9092
            - name: ORDER_CREATED_TOPIC
              value: "${ORDER_CREATED_TOPIC}"
            - name: ORDER_CREATED_DLQ_TOPIC
              value: "${ORDER_CREATED_DLQ_TOPIC}"