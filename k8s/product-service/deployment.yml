apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: 348071628290.dkr.ecr.ap-south-1.amazonaws.com/product-service:latest
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          ports:
            - containerPort: 3005

          env:
            - name: PORT
              value: "3005"

            # ✅ FIXED
            - name: DB_HOST
              value: postgres

            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: admin
            - name: DB_PASSWORD
              value: admin

            # ⚠️ NOTE: verify this DB exists
            - name: DB_NAME
              value: productdb

            - name: KAFKA_BROKER
              value: kafka:9092